<!DOCTYPE html>
<html>
    <head>
        <title>CG Practical 2:</title>
        <style> body { margin: 0; overflow: hidden; } </style>
        <script type="importmap">
            { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
        </script>
    </head>
    <body>
        <script type="module">
            import * as THREE from 'three';
            const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight,
            0.1, 1000);
            // Camera position: High up and back, looking down
            camera.position.set(0, 10, 10);
            camera.lookAt(0, 0, 0);
            const renderer = new THREE.WebGLRenderer();
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);
            // Helper: Grid on the floor
            const gridHelper = new THREE.GridHelper(20, 20);
            scene.add(gridHelper);
            // --- YOUR CODE BELOW ---
            const tankGroup = new THREE.Group();
            scene.add(tankGroup);
            // Tank body
            const tankBodyGeo = new THREE.BoxGeometry(2,1,3);
            const tankBodyMat = new THREE.MeshBasicMaterial({ color: 0x00ff00});
            const tankBody = new THREE.Mesh(tankBodyGeo, tankBodyMat);
            tankBody.position.set(0, 0.5, 0);
            tankGroup.add(tankBody);
            const turretGroup = new THREE.Group();
            turretGroup.position.set(0, 1, 0);
            tankGroup.add(turretGroup);
            // Turret
            const turretGeo = new THREE.SphereGeometry(0.5, 32, 32, 0, Math.PI * 2, 0, Math.PI / 2);
            const turretMat = new THREE.MeshBasicMaterial({ color: 0x0000ff});
            turretGroup.add(new THREE.Mesh(turretGeo, turretMat));
            // Barrel
            const barrelGeo = new THREE.CylinderGeometry(0.1, 0.1, 2, 32);
            const barrelMat = new THREE.MeshBasicMaterial({ color: 0x444444});
            const barrel = new THREE.Mesh(barrelGeo, barrelMat);
            barrel.rotation.x = Math.PI / 2;
            barrel.position.set(0, 0.1, 1);
            turretGroup.add(barrel);
            renderer.render(scene, camera);
            tankGroup.rotation.y = (Math.PI/2)

            function kapow(){
                const bulletGeo = new THREE.SphereGeometry(0.1, 16, 16);
                const bulletMat = new THREE.MeshBasicMaterial({ color: 0xff0000});
                const bullet = new THREE.Mesh(bulletGeo, bulletMat);
                const xdisp = Math.sin(tankGroup.rotation.y + turretGroup.rotation.y)
                const zdisp = Math.cos(tankGroup.rotation.y + turretGroup.rotation.y)
                bullet.position.set(
                    tankGroup.position.x + xdisp * 2,
                    1,
                    tankGroup.position.z + zdisp * 2
                );
                scene.add(bullet);
                const bulletSpeed = 0.2;
                function moveBullet() {
                    bullet.position.x += xdisp * bulletSpeed;
                    bullet.position.z += zdisp * bulletSpeed;
                    if (bullet.position.x < -10 || bullet.position.x > 10 || bullet.position.z < -10 || bullet.position.z > 10) {
                        scene.remove(bullet);
                    } else {
                        requestAnimationFrame(moveBullet);
                    }
                }
                requestAnimationFrame(moveBullet);
            }


            let keysDown = new Set();

            window.addEventListener("keydown", (event) => {
                if (event.key === "a") {
                    keysDown.add("a");
                } if (event.key === "d") {
                    keysDown.add("d");
                } if (event.key === "w") {
                    keysDown.add("w");
                } if (event.key === "s") {
                    keysDown.add("s");
                } if (event.key === " ") {
                    kapow();
                }
            });
            window.addEventListener("keyup", (event) => {
                if (event.key === "a") {
                    keysDown.delete("a");
                } if (event.key === "d") {
                    keysDown.delete("d");
                } if (event.key === "w") {
                    keysDown.delete("w");
                } if (event.key === "s") {
                    keysDown.delete("s");
                }
            });
            window.addEventListener("resize", () => {
                camera.aspect = window.innerWidth/window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
            function animate(time) {
                time *= 0.001;
                if (keysDown.has("a") && !keysDown.has("d")){
                    tankGroup.rotation.y += 0.033;
                } if (keysDown.has("d") && !keysDown.has("a")){ 
                    tankGroup.rotation.y -= 0.033;
                } if (keysDown.has("w") && !keysDown.has("s")) {
                    tankGroup.position.x += Math.sin(tankGroup.rotation.y) * 0.05;
                    tankGroup.position.z += Math.cos(tankGroup.rotation.y) * 0.05;
                } if (keysDown.has("s") && !keysDown.has("w")) {
                    tankGroup.position.x -= Math.sin(tankGroup.rotation.y) * 0.05;
                    tankGroup.position.z -= Math.cos(tankGroup.rotation.y) * 0.05;
                }
                turretGroup.rotation.y = Math.sin(time * 2) * 0.5;
                requestAnimationFrame(animate);
                renderer.render(scene, camera);
            }
            requestAnimationFrame(animate);


        </script>

    </body>
</html>
